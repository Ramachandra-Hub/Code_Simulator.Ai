# Judge0 CE production stack — run alongside main docker-compose:
# docker compose -f docker-compose.yml -f frontend/infra/judge0/docker-compose.judge0.yml up -d
version: "3.9"

services:
  judge0-db:
    image: postgres:16-alpine
    container_name: nexusedge-judge0-db
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
      POSTGRES_DB: judge0
    volumes:
      - judge0_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s
      timeout: 5s
      retries: 5

  judge0-redis:
    image: redis:7-alpine
    container_name: nexusedge-judge0-redis
    command: redis-server --appendonly yes
    volumes:
      - judge0_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  judge0:
    image: judge0/judge0:1.13.1
    container_name: nexusedge-judge0
    ports:
      - "2358:2358"
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
      AUTHN_TOKEN: ${JUDGE0_API_KEY:-change-me-in-production}
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2358/languages"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  judge0_db_data:
  judge0_redis_data:
